name: Claude Review

on:
  workflow_call:
    inputs:
      pr_number:
        description: PR number to review (only needed for workflow_dispatch callers)
        required: false
        type: string
    secrets:
      anthropic_api_key:
        required: true

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Review pull request
        uses: layered-ai-public/claude-review-action@main
        with:
          anthropic_api_key: ${{ secrets.anthropic_api_key }}
          pr_number: ${{ inputs.pr_number }}
